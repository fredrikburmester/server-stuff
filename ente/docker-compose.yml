# Ente Photos - Docker Compose
# For disaster recovery, set these env vars or edit paths directly:
#   ENTE_APPDATA - config/data directory (default: ./appdata)
#   ENTE_MINIO   - photo storage directory (default: ./minio-data)

services:
  museum:
    image: ghcr.io/ente-io/server
    container_name: ente-museum
    ports:
      - 8081:8080 # API
      - 2112:2112 # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${ENTE_APPDATA:-./appdata}/custom-logs:/var/logs
      - ${ENTE_APPDATA:-./appdata}/config/museum.yaml:/museum.yaml:ro
      - ${ENTE_APPDATA:-./appdata}/data:/data:ro
    networks:
      - internal

  socat:
    image: alpine/socat
    container_name: ente-socat
    network_mode: service:museum
    depends_on:
      - museum
    command: "TCP-LISTEN:3200,fork,reuseaddr TCP:minio:3200"

  postgres:
    image: postgres:15
    container_name: ente-postgres
    ports:
      - 5431:5432
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: ente_db
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "ente_db", "-U", "pguser"]
      start_period: 40s
      start_interval: 1s
    volumes:
      - ${ENTE_APPDATA:-./appdata}/postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  minio:
    image: minio/minio
    container_name: ente-minio
    ports:
      - 3200:3200 # API
      - 3201:3201 # Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ZZEG46YHCB9N}
    command: server /data --address ":3200" --console-address ":3201"
    volumes:
      - ${ENTE_MINIO:-./minio-data}:/data
    networks:
      - internal

  minio-provision:
    image: minio/mc
    container_name: ente-minio-provision
    depends_on:
      - minio
    volumes:
      - ${ENTE_APPDATA:-./appdata}/scripts/compose/provision.sh:/provision.sh:ro
      - ${ENTE_MINIO:-./minio-data}:/data
    networks:
      - internal
    entrypoint: sh /provision.sh

networks:
  internal:


